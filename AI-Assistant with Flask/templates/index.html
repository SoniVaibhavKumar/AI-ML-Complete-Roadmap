<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Personal Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="top-bar">
        <h1>AI Personal Assistant</h1>
        <div class="links">
            <a href="https://github.com/SoniVaibhavKumar" target="_blank">GitHub</a>
            <a href="https://www.linkedin.com/in/sonivaibhavkumar/" target="_blank">LinkedIn</a>
        </div>
    </div>

    <div class="container">
        <div class="grid">

            <div class="card">
                <h2>Ask Anything</h2>
                <form id="askForm">
                    <input type="text" name="question" placeholder="Ask anything..." required>
                    <button type="submit">Ask</button>
                </form>
                <p id="ask-loading" class="loading">Processing...</p>
                <div id="answer" class="output"></div>
            </div>

            <div class="card">
                <h2>Summarize</h2>
                <form id="emailForm">
                    <textarea name="email" placeholder="Paste your text..." required></textarea>
                    <button type="submit">Summarize</button>
                </form>
                <p id="summary-loading" class="loading">Processing...</p>
                <div id="summary" class="output"></div>
            </div>

        </div>
    </div>

<script>
document.getElementById("askForm").onsubmit = async (e) => {
    e.preventDefault();
    let formData = new FormData(e.target);

    let loading = document.getElementById("ask-loading");
    loading.style.display = "block";

    let res = await fetch("/ask", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    document.getElementById("answer").innerText = data.response;

    loading.style.display = "none";
};

document.getElementById("emailForm").onsubmit = async (e) => {
    e.preventDefault();
    let formData = new FormData(e.target);

    let loading = document.getElementById("summary-loading");
    loading.style.display = "block";

    let res = await fetch("/summarize", {
        method: "POST",
        body: formData
    });

    let data = await res.json();
    document.getElementById("summary").innerText = data.response;

    loading.style.display = "none";
};
</script>

</body>
</html>
